# NOTE: The live portfolio at https://doinkadoink.github.io/dark-technologist-portfolio/
# is served from the main branch root (index.html, html-templates/, public/, etc.).
# GitHub Pages does NOT serve Git LFS pointer files — portfolio videos must be
# regular git blobs under 100 MB each (see public/*.mp4).
#
# This workflow builds the optional React app to gh-pages only. It does NOT
# deploy the static project pages. Do not point GitHub Pages Settings at gh-pages
# unless you intentionally want the React build instead of the static site.

name: Deploy React build to gh-pages (optional)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build
      run: npm run build
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build
